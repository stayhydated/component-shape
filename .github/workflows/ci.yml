name: ci

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install Linux dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends \
            libasound2-dev \
            libfontconfig1-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - name: Build documentation
        run: cargo doc --workspace --all-features --no-deps --locked

  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install Linux dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends \
            libasound2-dev \
            libfontconfig1-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - name: Check crates.io packages
        run: cargo publish --workspace --dry-run --locked
