codecov:
  require_ci_to_pass: true

# https://docs.codecov.com/docs/components
component_management:
  individual_components:
    - component_id: component-shape
      name: "component-shape"
      paths:
        - crates/component-shape/**

    - component_id: component-shape-codegen
      name: "component-shape-codegen"
      paths:
        - crates/component-shape-codegen/**

    - component_id: component-shape-gpui
      name: "component-shape-gpui"
      paths:
        - crates/component-shape-gpui/**

    - component_id: component-shape-gpui-macros
      name: "component-shape-gpui-macros"
      paths:
        - crates/component-shape-gpui-macros/**

    - component_id: component-shape-mcp
      name: "component-shape-mcp"
      paths:
        - crates/component-shape-mcp/**

    - component_id: component-shape-mcp-macros
      name: "component-shape-mcp-macros"
      paths:
        - crates/component-shape-mcp-macros/**

coverage:
  precision: 2
  round: down
  range: "90...100"
  status:
    project:
      default:
        target: 90%
        threshold: 5%
    patch:
      default:
        target: 90%
        threshold: 10%
